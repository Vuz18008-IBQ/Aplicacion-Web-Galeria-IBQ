<div class="container-fluid py-4 px-4">
  <form [formGroup]="form" (ngSubmit)="guardar()" novalidate>

    <div class="d-flex justify-content-between align-items-start mb-4 flex-wrap gap-3">
      <h1 class="h3 mb-0">
        @if (esEdicion()) { Editar Autor } @else { Añadir Autor }
      </h1>
      <div>
        <button type="button" class="btn btn-outline-secondary me-2" (click)="cancelar()">Cancelar</button>
        <button type="submit" class="btn btn-dark" [disabled]="cargando()">Guardar</button>
      </div>
    </div>

    @if (error()) {
      <div class="alert alert-danger">{{ error() }}</div>
    }

    <div class="card border-0 shadow-sm p-4 mx-auto" style="max-width: 700px;">

      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <label for="nombre" class="form-label">Nombre</label>
          <input id="nombre" type="text" class="form-control"
                 [class.is-invalid]="form.controls.nombre.invalid && form.controls.nombre.touched"
                 formControlName="nombre">
          <div class="invalid-feedback">El nombre es obligatorio.</div>
        </div>
        <div class="col-md-6">
          <label for="apellidos" class="form-label">Apellidos</label>
          <input id="apellidos" type="text" class="form-control"
                 [class.is-invalid]="form.controls.apellidos.invalid && form.controls.apellidos.touched"
                 formControlName="apellidos">
          <div class="invalid-feedback">Los apellidos son obligatorios.</div>
        </div>
      </div>

      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <label for="fecha_nacimiento" class="form-label">Año de nacimiento</label>
          <input id="fecha_nacimiento" type="number" class="form-control"
                 formControlName="fecha_nacimiento"
                 placeholder="Ej. 1890">
        </div>
        <div class="col-md-6">
          <label for="fecha_muerte" class="form-label">Año de fallecimiento</label>
          <input id="fecha_muerte" type="number" class="form-control"
                 formControlName="fecha_muerte"
                 placeholder="Ej. 1965">
        </div>
      </div>

      <div class="mb-3">
        <label for="corriente_artistica" class="form-label">Corriente artística</label>
        <input id="corriente_artistica" type="text" class="form-control"
               formControlName="corriente_artistica"
               placeholder="Ej. Impresionismo">
      </div>

      <div class="mb-3">
        <label for="lugar_nacimiento" class="form-label">Lugar de nacimiento</label>
        <input id="lugar_nacimiento" type="text" class="form-control"
               formControlName="lugar_nacimiento"
               placeholder="Ej. Gijón, Asturias">
      </div>

    </div>

  </form>
</div>
